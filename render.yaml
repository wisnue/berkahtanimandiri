# File ini tidak lagi digunakan.
# Backend sekarang di-deploy ke Vercel (bukan Render).
# Lihat docs/DEPLOY_GUIDE.md untuk panduan deploy lengkap.
#
# Stack produksi saat ini:
#   Frontend  → Vercel (root dir: apps/frontend)
#   Backend   → Vercel (root dir: apps/backend)
#   Database  → Supabase (PostgreSQL)

# --- ARCHIVED (tidak aktif) ---
# services:
#   - type: web
#     name: kth-btm-backend
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # DATABASE_URL: Isi di Vercel Dashboard → Project → Settings → Environment Variables
      # Salin dari Supabase: Project Settings → Database → Connection string → URI
      # Gunakan Transaction Pooler (port 6543), contoh:
      # postgresql://postgres.xxxx:[PASSWORD]@aws-0-ap-southeast-1.pooler.supabase.com:6543/postgres
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true  # Render auto-generate secret
      - key: CORS_ORIGIN
        value: "https://berkahtanimandiri.vercel.app"
      - key: BCRYPT_ROUNDS
        value: "10"
      - key: MAX_LOGIN_ATTEMPTS
        value: "5"
      - key: LOCKOUT_DURATION
        value: "900000"
      - key: MAX_FILE_SIZE
        value: "10485760"
      - key: UPLOAD_DIR
        value: "/tmp/uploads"
      - key: PNBP_TARIF_PER_HA
        value: "15000"
      - key: TAHUN_PNBP
        value: "2026"
      - key: OTP_ISSUER
        value: "KTH-BTM"
      - key: OTP_WINDOW
        value: "1"
